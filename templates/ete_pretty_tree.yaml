# ETE pretty phylogeny render template
# Apply with:
#   python scripts/apply_ete_template.py --tree path/to/bac120_tree.nwk --best-table path/to/best_of_best/selected_set/master.tsv
#
# Values filled by scripts/apply_ete_template.py:
# - TREE: Newick tree path.
# - METADATA_CORE / METADATA_GUNC / METADATA_QUALITY / METADATA_TAXONOMY: tree metadata tables.
# - METADATA_SPECIFIC_MARKER: functional marker heatmap metadata table.
# - OUTPUT_PREFIX: output path without extension.
# - BEST_REPRESENTATIVE_TABLE: best_of_best selected-set master TSV.
#
tree: {{TREE}}
metadata:
- {{METADATA_CORE}}
- {{METADATA_GUNC}}
- {{METADATA_QUALITY}}
- {{METADATA_TAXONOMY}}
- {{METADATA_SPECIFIC_MARKER}}
id_column: tree_id
output_prefix: {{OUTPUT_PREFIX}}
output_formats:
- svg
- pdf
- png
newick_format: 0
rooting:
  method: midpoint
  outgroup_id: ''
layout: rectangular
canvas:
  width_mm: 390
  dpi: 300
  arc_start: -210
  arc_span: 240
  margin_top: 30
  margin_right: 220
  margin_bottom: 105
  margin_left: 40
  show_scale: true
ladderize: true
show_leaf_names: false
leaf_name_column: tree_id
leaf_name_font_size: 7
branch_width: 2
spacing:
  after_leaf_name: 6
  before_strips: 24
  between_strips: 3
  between_strips_and_text: 7
  between_text_columns: 6
  between_heatmap_and_text: 8
support:
  show: true
  min_value: 0.9
  font_size: 6
  scale: auto
  position: branch-top
clade_brackets:
- column: Phylum
  label: Phylum
  show: false
  font_size: 8
  position: branch-right
  min_tips: 2
  margin_left: 8
  color: '#111111'
branch_colors:
- column: Phylum
  label: Phylum branches
  show: true
  palette: default
  mixed_color: '#777777'
  color_mixed: false
metadata_strips:
- column: category
  label: Category
  width: 10
  height: 9
  palette:
    MAGs: '#4E79A7'
    SAGs: purple
    xPG_MAGs: '#59A14F'
    xPG_SAGs: '#F28E2B'
- column: sample
  label: Sample
  width: 10
  height: 9
  palette: default
heatmap_columns:
- column: integrity_score
  label: Integrity
  show: true
  width: 7
  height: 9
  min_value: 0
  max_value: 1
  value_scale: 1
  reverse: false
  gap_after: 1
  label_margin_left: 0
  label_margin_right: 16
- column: recoverability_score
  label: Recoverability
  show: true
  width: 7
  height: 9
  min_value: 0
  max_value: 1
  value_scale: 1
  reverse: false
  gap_after: 1
  label_margin_left: 0
  label_margin_right: 16
- column: Completeness
  label: Completeness
  show: true
  width: 7
  height: 9
  min_value: 0
  max_value: 1
  value_scale: 0.01
  reverse: false
  gap_after: 1
  label_margin_left: 0
  label_margin_right: 16
- column: Contamination
  label: Contamination
  show: true
  width: 7
  height: 9
  min_value: 0
  max_value: 1
  value_scale: 0.01
  reverse: false
  gap_after: 1
