best_representatives:
  show: true
  table: {{BEST_REPRESENTATIVE_TABLE}}
  marker: '*'
  match_columns:
  - sample
  - category
  - Genome_Id
  output_column: best_representative
text_columns:
- column: Family
  label: Family
  font_size: 6
  max_length: null
  width: auto
  align: left
- column: Species
  label: Species
  font_size: 6
  max_length: null
  width: auto
  align: left
  mark_best_representative: true
numeric_bars: []
legend:
  show: true
  max_items_per_strip: 20
  title_font_size: 8
  item_font_size: 6
  swatch_size: 8
  right_padding: 8
  swatch_text_gap: 2
  title_padding: 80
  heatmap_label_font_size: 5
  show_heatmap_column_labels: true
  heatmap_column_label: Heatmap columns
